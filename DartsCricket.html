<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a202c">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            overscroll-behavior: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #2d3748; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px; }

        .action-btn { transition: all 0.1s; touch-action: manipulation; }
        .action-btn:active { transform: scale(0.95); }

        .input-focus-ring:focus {
            outline: 2px solid #4ade80; /* Green-400 */
            outline-offset: 2px;
        }

        /* Cricket Grid */
        .cricket-grid {
            display: grid;
            grid-template-columns: 3rem repeat(auto-fit, minmax(3rem, 1fr));
            gap: 1px;
            background-color: #374151; /* Gray-700 borders */
        }
        .cricket-cell {
            background-color: #1f2937; /* Gray-800 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            font-weight: bold;
        }
        .closed-row .cricket-cell {
            background-color: #111827; /* Gray-900 */
            color: #4b5563;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <div id="app" class="relative w-full h-full max-w-lg mx-auto flex flex-col bg-gray-900 shadow-2xl">
        
        <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center z-10">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bullseye text-green-500 text-xl"></i>
                <h1 class="text-xl font-bold text-white tracking-wide">Cricket</h1>
            </div>
            <div class="flex gap-2">
                 <button id="reset-data-btn" class="text-gray-400 hover:text-white transition-colors p-2"><i class="fa-solid fa-rotate-right"></i></button>
                <a href="bardarts.html" class="text-gray-400 hover:text-white transition-colors p-2"><i class="fa-solid fa-door-open"></i></a>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- Setup View -->
            <div id="setup-view" class="absolute inset-0 z-20 bg-gray-900 flex flex-col p-6 overflow-y-auto">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-users text-3xl text-green-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Game Setup</h2>
                    <p class="text-gray-400 text-sm">Close numbers 15-20 & Bull!</p>
                </div>
                <div class="space-y-4 flex-1">
                    <div id="player-inputs" class="space-y-3"></div>
                    <div class="flex gap-2 mt-4">
                        <input type="text" id="new-player-name" placeholder="Name" class="input-focus-ring flex-1 bg-gray-800 border border-gray-700 text-white p-3 rounded-lg" />
                        <button id="add-player-btn" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <button id="start-game-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6" disabled>Start Game</button>
            </div>

            <!-- Game View -->
            <div id="game-view" class="absolute inset-0 bg-gray-900 flex flex-col hidden">
                
                <!-- Scoreboard Area -->
                <div class="flex-1 overflow-auto bg-gray-900 p-2">
                    <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
                        <!-- Dynamic Header -->
                        <div class="grid gap-px bg-gray-700 sticky top-0 z-10" id="score-header" style="grid-template-columns: 3rem repeat(auto-fit, minmax(3rem, 1fr));">
                            <!-- Injected by JS -->
                        </div>
                        
                        <!-- Grid Body -->
                        <div id="score-body" class="grid gap-px bg-gray-700" style="grid-template-columns: 3rem repeat(auto-fit, minmax(3rem, 1fr));">
                            <!-- Injected by JS -->
                        </div>

                        <!-- Footer (Scores) -->
                        <div class="grid gap-px bg-gray-700 sticky bottom-0 z-10 border-t-2 border-gray-600" id="score-footer" style="grid-template-columns: 3rem repeat(auto-fit, minmax(3rem, 1fr));">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- Info Bar -->
                <div class="bg-gray-800 px-4 py-2 border-t border-gray-700 flex justify-between items-center text-sm">
                    <div class="font-bold text-white"><span class="text-green-400">Turn:</span> <span id="turn-name">Player</span></div>
                    <div class="flex gap-1" id="throw-dots">
                        <div class="w-3 h-3 rounded-full bg-gray-600"></div>
                        <div class="w-3 h-3 rounded-full bg-gray-600"></div>
                        <div class="w-3 h-3 rounded-full bg-gray-600"></div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="bg-gray-800 p-2 pb-6 z-20 border-t border-gray-700">
                    <div class="grid grid-cols-6 gap-1 mb-2">
                        <!-- Columns for 20-15 -->
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(20, 1)">20</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(20, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(20, 3)">T</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(19, 1)">19</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(19, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(19, 3)">T</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(18, 1)">18</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(18, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(18, 3)">T</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(17, 1)">17</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(17, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(17, 3)">T</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(16, 1)">16</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(16, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(16, 3)">T</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-gray-700 text-white h-12 rounded font-bold text-lg" onclick="handleHit(15, 1)">15</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-green-400 h-10 rounded font-bold text-xs" onclick="handleHit(15, 2)">D</button>
                            <button class="action-btn bg-gray-800 border border-gray-600 text-orange-400 h-10 rounded font-bold text-xs" onclick="handleHit(15, 3)">T</button>
                        </div>
                    </div>

                    <!-- Bottom Controls -->
                    <div class="grid grid-cols-4 gap-2">
                        <!-- Bull Stack -->
                        <div class="flex flex-col gap-1">
                            <button class="action-btn bg-red-900/40 text-red-400 flex-1 rounded font-bold border border-red-900/60 text-xs flex items-center justify-center" onclick="handleHit(25, 2)">D-BULL</button>
                            <button class="action-btn bg-red-900/20 text-red-400 flex-1 rounded font-bold border border-red-900/40 text-xs flex items-center justify-center" onclick="handleHit(25, 1)">S-BULL</button>
                        </div>
                        <button class="action-btn bg-gray-600 text-gray-300 rounded font-bold" onclick="handleMiss()">MISS</button>
                        <button class="action-btn bg-gray-600 text-gray-300 rounded font-bold" onclick="handleUndo()"><i class="fa-solid fa-rotate-left"></i></button>
                        <button class="action-btn bg-green-600 text-white rounded font-bold" id="next-btn" onclick="nextTurn()">NEXT</button>
                    </div>
                </div>
            </div>

            <!-- Results View -->
            <div id="results-view" class="absolute inset-0 bg-gray-900 z-30 flex flex-col p-6 hidden">
                <div class="text-center mb-8 pt-10">
                    <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 animate-bounce"></i>
                    <h2 class="text-4xl font-bold text-white mb-2">Winner!</h2>
                    <p class="text-xl text-gray-400" id="winner-name">Player Name</p>
                </div>
                <div class="flex-1 flex flex-col justify-end gap-4 pb-10">
                    <button id="new-game-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg">Play Again</button>
                    <a href="bardarts.html" class="w-full block text-center text-gray-500 hover:text-white py-3 bg-gray-800 rounded-xl">Menu</a>
                </div>
            </div>

        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-xs w-full shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold text-white mb-2">Reset Game?</h3>
            <div class="flex gap-3 mt-4">
                <button id="cancel-reset" class="flex-1 py-3 rounded-xl bg-gray-700 text-white font-bold">Cancel</button>
                <button id="confirm-reset" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold">Reset</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'Cricket_v2_state';
        const NUMS = [20, 19, 18, 17, 16, 15, 25];

        let gameState = {
            players: [], // { name, marks: {20:0...}, score:0 }
            phase: 'setup',
            currentPlayerIdx: 0,
            turnThrows: [], // { num, points, marks }
            closedNums: {}, // { 20: false... }
            history: [] 
        };

        // --- DOM & Init ---
        const views = { setup: document.getElementById('setup-view'), game: document.getElementById('game-view'), results: document.getElementById('results-view') };
        const modals = { confirm: document.getElementById('confirm-modal') };

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            render();
        });

        function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }
        function loadState() { try { const s = localStorage.getItem(STORAGE_KEY); if(s) gameState = JSON.parse(s); } catch(e){} }
        function pushHistory() {
             const copy = JSON.parse(JSON.stringify(gameState));
             copy.history = [];
             gameState.history.push(copy);
             if(gameState.history.length > 5) gameState.history.shift();
        }

        function render() {
            Object.values(views).forEach(el => el.classList.add('hidden'));
            if(gameState.phase === 'setup') {
                views.setup.classList.remove('hidden');
                renderSetup();
            } else if(gameState.phase === 'playing') {
                views.game.classList.remove('hidden');
                renderGame();
            } else {
                views.results.classList.remove('hidden');
                document.getElementById('winner-name').textContent = gameState.winner || "Player";
            }
        }

        // --- Setup ---
        const playerInput = document.getElementById('new-player-name');
        function renderSetup() {
            const list = document.getElementById('player-inputs');
            list.innerHTML = '';
            gameState.players.forEach((p, i) => {
                list.innerHTML += `<div class="flex items-center gap-3 bg-gray-800 p-3 rounded-lg border border-gray-700">
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center font-bold text-gray-400">${i+1}</div>
                    <span class="flex-1 font-semibold text-white">${p.name}</span>
                    <button onclick="removePlayer(${i})" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
            document.getElementById('start-game-btn').disabled = gameState.players.length < 1;
        }

        document.getElementById('add-player-btn').addEventListener('click', addPlayer);
        playerInput.addEventListener('keypress', e => { if(e.key === 'Enter') addPlayer() });

        function addPlayer() {
            const name = playerInput.value.trim();
            if(name) {
                gameState.players.push({ name, marks: {}, score: 0 });
                playerInput.value = '';
                saveState();
                render();
            }
        }
        window.removePlayer = (i) => { gameState.players.splice(i, 1); saveState(); render(); };

        document.getElementById('start-game-btn').addEventListener('click', () => {
            gameState.phase = 'playing';
            gameState.currentPlayerIdx = 0;
            gameState.turnThrows = [];
            gameState.history = [];
            gameState.closedNums = {};
            NUMS.forEach(n => gameState.closedNums[n] = false);
            
            gameState.players.forEach(p => { 
                p.score = 0; 
                p.marks = {}; 
                NUMS.forEach(n => p.marks[n] = 0);
            });
            saveState();
            render();
        });

        // --- Game Logic ---
        function renderGame() {
            const p = gameState.players[gameState.currentPlayerIdx];
            document.getElementById('turn-name').textContent = p.name;
            
            // Grid Styles Update
            const gridStyle = `grid-template-columns: 3rem repeat(${gameState.players.length}, 1fr);`;
            document.getElementById('score-header').style = gridStyle;
            document.getElementById('score-body').style = gridStyle;
            document.getElementById('score-footer').style = gridStyle;

            // Header
            let headerHTML = `<div class="cricket-cell bg-gray-800 text-gray-500 text-xs">NUM</div>`;
            gameState.players.forEach((pl, i) => {
                const isActive = i === gameState.currentPlayerIdx;
                headerHTML += `<div class="cricket-cell text-sm ${isActive ? 'text-green-400 bg-gray-800' : 'text-white'} truncate">${pl.name.substring(0,3)}</div>`;
            });
            document.getElementById('score-header').innerHTML = headerHTML;

            // Body
            let bodyHTML = '';
            NUMS.forEach(num => {
                const isClosed = gameState.closedNums[num];
                const rowClass = isClosed ? 'closed-row' : '';
                bodyHTML += `<div class="cricket-cell text-sm text-gray-400 ${rowClass}">${num===25?'B':num}</div>`;
                
                gameState.players.forEach((pl, i) => {
                    const marks = pl.marks[num] || 0;
                    let symbol = '';
                    if(marks === 1) symbol = '/';
                    if(marks === 2) symbol = 'X';
                    if(marks >= 3) symbol = '⦻';
                    
                    const isActive = i === gameState.currentPlayerIdx;
                    const bg = isActive ? 'bg-gray-800/50' : '';
                    
                    bodyHTML += `<div class="cricket-cell text-yellow-400 text-lg ${rowClass} ${bg}">${symbol}</div>`;
                });
            });
            document.getElementById('score-body').innerHTML = bodyHTML;

            // Footer
            let footerHTML = `<div class="cricket-cell text-xs text-gray-500">PTS</div>`;
            gameState.players.forEach((pl, i) => {
                const isActive = i === gameState.currentPlayerIdx;
                 footerHTML += `<div class="cricket-cell text-lg font-bold ${isActive ? 'text-green-400' : 'text-white'}">${pl.score}</div>`;
            });
            document.getElementById('score-footer').innerHTML = footerHTML;

            // Throws
            const dots = document.getElementById('throw-dots').children;
            for(let i=0; i<3; i++) {
                dots[i].className = `w-3 h-3 rounded-full ${i < gameState.turnThrows.length ? 'bg-green-500' : 'bg-gray-600'}`;
            }
            
            // Next Button State
            const nextBtn = document.getElementById('next-btn');
            if(gameState.turnThrows.length >= 3) {
                 nextBtn.disabled = false;
                 nextBtn.classList.remove('opacity-50');
                 nextBtn.classList.add('animate-pulse');
            } else {
                 nextBtn.disabled = true;
                 nextBtn.classList.add('opacity-50');
                 nextBtn.classList.remove('animate-pulse');
            }
        }

        window.handleHit = (num, multiplier = 1) => {
            if(gameState.turnThrows.length >= 3) return;
            pushHistory();
            
            const player = gameState.players[gameState.currentPlayerIdx];
            let totalPointsAdded = 0;
            let totalMarksAdded = 0;

            // Loop per 'mark' to handle transition from closing to scoring correctly within a single Triple
            for(let i = 0; i < multiplier; i++) {
                if(player.marks[num] < 3) {
                    player.marks[num]++;
                    totalMarksAdded++;
                } else {
                    if(!gameState.closedNums[num]) {
                        player.score += num;
                        totalPointsAdded += num;
                    }
                }
            }

            // Check global close
            let allClosed = true;
            gameState.players.forEach(p => { if(p.marks[num] < 3) allClosed = false; });
            if(allClosed) gameState.closedNums[num] = true;

            gameState.turnThrows.push({ num, points: totalPointsAdded, marks: totalMarksAdded });
            
            checkWinner();
            saveState();
            render();
        };

        window.handleMiss = () => {
             if(gameState.turnThrows.length >= 3) return;
             pushHistory();
             gameState.turnThrows.push({ num: null, points: 0, marks: 0 });
             saveState();
             render();
        };

        window.handleUndo = () => {
             if(gameState.history.length > 0) {
                 gameState = gameState.history.pop();
                 saveState();
                 render();
             }
        };

        window.nextTurn = () => {
            gameState.currentPlayerIdx = (gameState.currentPlayerIdx + 1) % gameState.players.length;
            gameState.turnThrows = [];
            gameState.history = []; // Clear undo history on turn change to simplify
            saveState();
            render();
        };

        function checkWinner() {
             const p = gameState.players[gameState.currentPlayerIdx];
             const allClosed = NUMS.every(n => p.marks[n] >= 3);
             
             if(allClosed) {
                 // Must also have highest score (or tied)
                 const highestScore = Math.max(...gameState.players.map(pl => pl.score));
                 if(p.score >= highestScore) {
                     gameState.winner = p.name;
                     gameState.phase = 'over';
                 }
             }
        }

        // --- Reset ---
        document.getElementById('new-game-btn').addEventListener('click', () => {
            gameState.phase = 'setup';
            gameState.players.forEach(p => { p.score = 0; p.marks = {}; });
            render();
        });
        
        document.getElementById('reset-data-btn').addEventListener('click', () => modals.confirm.classList.remove('hidden'));
        document.getElementById('cancel-reset').addEventListener('click', () => modals.confirm.classList.add('hidden'));
        document.getElementById('confirm-reset').addEventListener('click', () => {
            gameState = { players: [], phase: 'setup', currentPlayerIdx: 0, history: [] };
            saveState();
            render();
            modals.confirm.classList.add('hidden');
        });

    </script>
</body>
</html>
