<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killer Darts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="manifest" href="killer_manifest.json">
    <meta name="theme-color" content="#1a202c">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            overscroll-behavior: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; 
            border-radius: 4px;
        }

        .action-btn {
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .killer-active {
            animation: pulse-red 2s infinite;
            border-color: #ef4444 !important;
        }

        .input-focus-ring:focus {
            outline: 2px solid #f6ad55; /* Orange-400 */
            outline-offset: 2px;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- App Container -->
    <!-- Changed: Removed max-w-lg to allow horizontal resizing -->
    <div id="app" class="relative w-full h-full mx-auto flex flex-col bg-gray-900 shadow-2xl">
        
        <!-- Header -->
        <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center z-10 shrink-0">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-skull-crossbones text-red-500 text-xl"></i>
                <h1 class="text-xl font-bold text-white tracking-wide">Killer Darts</h1>
            </div>
            <div class="flex gap-2">
                 <button id="reset-data-btn" class="text-gray-400 hover:text-white transition-colors p-2" title="Reset Game">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <a href="bardarts.html" class="text-gray-400 hover:text-white transition-colors p-2" title="Exit">
                    <i class="fa-solid fa-door-open"></i>
                </a>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- VIEW: Setup -->
            <div id="setup-view" class="absolute inset-0 z-20 bg-gray-900 flex flex-col p-6 overflow-y-auto">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-users text-3xl text-red-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Game Setup</h2>
                    <p class="text-gray-400 text-sm">Add players to begin the hunt.</p>
                </div>

                <div class="space-y-4 flex-1">
                    <div id="player-inputs" class="space-y-3">
                        <!-- Player list generated here -->
                    </div>
                    
                    <div class="flex gap-2 mt-4">
                        <input type="text" id="new-player-name" placeholder="Enter Name" class="input-focus-ring flex-1 bg-gray-800 border border-gray-700 text-white p-3 rounded-lg transition-all" />
                        <button id="add-player-btn" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-colors">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>

                <button id="start-game-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6 transform transition hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Start Game
                </button>
            </div>

            <!-- VIEW: Target Selection -->
            <div id="target-view" class="absolute inset-0 z-30 bg-gray-900 flex flex-col hidden">
                <div class="bg-gray-800 p-4 border-b border-gray-700 shrink-0">
                    <h2 id="target-title" class="text-lg font-bold text-white text-center">Set Target</h2>
                    <p class="text-center text-sm text-gray-400"><span id="target-setter-name" class="text-yellow-400 font-bold">Player</span> is choosing...</p>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4">
                    <div id="target-grid-numbers" class="grid grid-cols-5 gap-3 mb-4">
                        <!-- 1-20 buttons -->
                    </div>
                    <div id="target-grid-bull" class="grid grid-cols-2 gap-3 mb-4">
                         <button class="target-btn bg-gray-700 p-4 rounded-xl font-bold text-white border border-gray-600" data-bull="SB">SB</button>
                         <button class="target-btn bg-red-900/50 p-4 rounded-xl font-bold text-red-400 border border-red-800" data-bull="DB">DB</button>
                    </div>

                    <!-- Multiplier Selection (Hidden initially) -->
                    <div id="target-multipliers" class="hidden flex flex-col gap-3 h-full">
                         <button id="back-to-nums" class="mb-2 text-gray-400 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Back to Numbers</button>
                         <div class="grid grid-cols-2 gap-3 flex-1">
                             <!-- Multipliers injected here -->
                         </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: Gameplay -->
            <div id="game-view" class="absolute inset-0 bg-gray-900 flex flex-col hidden">
                
                <!-- Info Banner -->
                <div class="bg-gray-800 p-4 shadow-md z-10 border-b border-gray-700 shrink-0">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Killer</span>
                            <div class="text-xl font-bold text-red-400 truncate max-w-[150px]" id="current-killer-name">
                                -
                            </div>
                        </div>
                        <div class="text-center">
                            <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Target</span>
                            <!-- Changed: Increased font size for current target from text-3xl to text-6xl -->
                            <div class="text-6xl font-bold text-yellow-400" id="game-target-display">
                                -
                            </div>
                        </div>
                        <div class="text-right">
                             <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Turn</span>
                             <div class="text-xl font-bold text-white truncate max-w-[150px]" id="current-turn-name">
                                -
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Player List -->
                <div class="flex-1 overflow-y-auto p-4 space-y-3" id="players-container">
                    <!-- Player Cards Injected Here -->
                </div>

                <!-- Controls -->
                <div class="bg-gray-800 border-t border-gray-700 p-3 z-20 pb-6 shrink-0">
                     <!-- Changed: Decreased button container height from h-20 to h-14 -->
                     <div class="grid grid-cols-5 gap-2 h-14">
                        <button id="undo-btn" class="col-span-1 bg-gray-700 text-gray-300 rounded-xl flex items-center justify-center hover:bg-gray-600 action-btn">
                            <i class="fa-solid fa-rotate-left text-xl"></i>
                        </button>
                        <button id="miss-btn" class="col-span-2 bg-red-500/10 border border-red-500/50 text-red-500 rounded-xl flex flex-col items-center justify-center hover:bg-red-500/20 action-btn">
                            <!-- Changed: Adjusted text size to fit new button height -->
                            <span class="text-lg font-bold">MISS</span>
                            <span class="text-[10px] opacity-75 leading-none">Lose Life</span>
                        </button>
                        <button id="hit-btn" class="col-span-2 bg-green-500/10 border border-green-500/50 text-green-500 rounded-xl flex flex-col items-center justify-center hover:bg-green-500/20 action-btn">
                            <span class="text-lg font-bold">HIT</span>
                            <span class="text-[10px] opacity-75 leading-none">Become Killer</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIEW: Results -->
            <div id="results-view" class="absolute inset-0 bg-gray-900 z-30 flex flex-col p-6 hidden">
                <div class="text-center mb-8 pt-10">
                    <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 animate-bounce"></i>
                    <h2 class="text-4xl font-bold text-white mb-2">Game Over!</h2>
                    <p class="text-xl text-gray-400" id="winner-name">Player Wins</p>
                </div>
                
                <div class="flex-1 flex flex-col justify-end gap-4 pb-10">
                    <button id="new-game-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                        Play Again
                    </button>
                    <a href="bardarts.html" class="w-full block text-center text-gray-500 hover:text-white py-3 bg-gray-800 rounded-xl">
                        Return to Menu
                    </a>
                </div>
            </div>

        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-xs w-full shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold text-white mb-2">Reset Game?</h3>
            <p class="text-gray-400 mb-6 text-sm">This will clear all current progress.</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-3 rounded-xl bg-gray-700 text-white font-bold hover:bg-gray-600">Cancel</button>
                <button id="confirm-reset" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const STORAGE_KEY = 'killerDarts_v2_state';

        let gameState = {
            players: [], // { name, lives, isAlive }
            phase: 'setup', // 'setup', 'target_init', 'target_new', 'playing', 'over'
            currentPlayerIndex: 0,
            killerPlayerIndex: 0,
            currentTarget: null,
            targetDraft: { number: null }, // Temp state for target selection UI
            history: [] // For undo
        };

        // --- DOM Elements ---
        const views = {
            setup: document.getElementById('setup-view'),
            target: document.getElementById('target-view'),
            game: document.getElementById('game-view'),
            results: document.getElementById('results-view')
        };
        const modals = {
            confirm: document.getElementById('confirm-modal')
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            setupTargetGrid();
            render();
        });

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    gameState = JSON.parse(saved);
                }
            } catch (e) {
                console.error("Save load error", e);
            }
        }

        function pushHistory() {
            // Keep last 5 moves
            const stateCopy = JSON.parse(JSON.stringify(gameState));
            stateCopy.history = []; // Don't nest history
            gameState.history.push(stateCopy);
            if(gameState.history.length > 5) gameState.history.shift();
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden'));
            if(views[viewName]) views[viewName].classList.remove('hidden');
        }

        function render() {
            switchView(gameState.phase === 'target_init' || gameState.phase === 'target_new' ? 'target' : 
                       gameState.phase === 'playing' ? 'game' : 
                       gameState.phase === 'over' ? 'results' : 'setup');

            if (gameState.phase === 'setup') {
                renderSetup();
            } else if (gameState.phase.startsWith('target')) {
                renderTargetSelection();
            } else if (gameState.phase === 'playing') {
                renderGame();
            } else if (gameState.phase === 'over') {
                renderResults();
            }
        }

        // --- Setup Logic ---
        const playerInputsContainer = document.getElementById('player-inputs');
        const newPlayerInput = document.getElementById('new-player-name');
        
        function renderSetup() {
            playerInputsContainer.innerHTML = '';
            gameState.players.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-gray-800 p-3 rounded-lg border border-gray-700";
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center font-bold text-gray-400">${i+1}</div>
                    <span class="flex-1 font-semibold text-white">${p.name}</span>
                    <button onclick="removePlayer(${i})" class="text-red-400 hover:text-red-300 p-2"><i class="fa-solid fa-trash"></i></button>
                `;
                playerInputsContainer.appendChild(div);
            });
            document.getElementById('start-game-btn').disabled = gameState.players.length < 2;
        }

        document.getElementById('add-player-btn').addEventListener('click', addPlayer);
        newPlayerInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addPlayer() });

        function addPlayer() {
            const name = newPlayerInput.value.trim();
            if (name) {
                gameState.players.push({ name, lives: 5, isAlive: true });
                newPlayerInput.value = '';
                saveState();
                render();
            }
        }

        window.removePlayer = (index) => {
            gameState.players.splice(index, 1);
            saveState();
            render();
        };

        document.getElementById('start-game-btn').addEventListener('click', () => {
            gameState.phase = 'target_init';
            gameState.currentPlayerIndex = 0;
            gameState.killerPlayerIndex = 0;
            gameState.history = [];
            saveState();
            render();
        });

        // --- Target Selection Logic ---
        function setupTargetGrid() {
            const grid = document.getElementById('target-grid-numbers');
            for(let i=20; i>=1; i--) {
                const btn = document.createElement('button');
                btn.className = "target-btn bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-lg p-2 aspect-square flex items-center justify-center border border-gray-600";
                btn.textContent = i;
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            }

            document.querySelectorAll('[data-bull]').forEach(btn => {
                btn.addEventListener('click', (e) => selectBull(e.target.dataset.bull));
            });

            document.getElementById('back-to-nums').addEventListener('click', () => {
                gameState.targetDraft.number = null;
                renderTargetSelection();
            });
        }

        function renderTargetSelection() {
            const title = document.getElementById('target-title');
            const setterName = document.getElementById('target-setter-name');
            const numGrid = document.getElementById('target-grid-numbers');
            const bullGrid = document.getElementById('target-grid-bull');
            const multipliers = document.getElementById('target-multipliers');

            const setterIndex = gameState.phase === 'target_init' ? 0 : gameState.currentPlayerIndex;
            setterName.textContent = gameState.players[setterIndex].name;
            title.textContent = gameState.phase === 'target_init' ? 'Set Initial Target' : 'New Killer Target';

            if (gameState.targetDraft.number === null) {
                // Show Numbers
                numGrid.classList.remove('hidden');
                bullGrid.classList.remove('hidden');
                multipliers.classList.add('hidden');
            } else {
                // Show Multipliers
                numGrid.classList.add('hidden');
                bullGrid.classList.add('hidden');
                multipliers.classList.remove('hidden');
                renderMultipliers(gameState.targetDraft.number);
            }
        }

        function selectNumber(num) {
            gameState.targetDraft.number = num;
            renderTargetSelection();
        }

        function selectBull(type) {
            confirmTarget(type === 'SB' ? 'Single Bull' : 'Double Bull');
        }

        function renderMultipliers(num) {
            const container = document.querySelector('#target-multipliers .grid');
            container.innerHTML = '';
            
            const options = [
                { l: 'Single', v: `S${num}`, c: 'bg-gray-700 text-white' },
                { l: 'Double', v: `D${num}`, c: 'bg-green-900/40 text-green-400 border border-green-800' },
                { l: 'Treble', v: `T${num}`, c: 'bg-orange-900/40 text-orange-400 border border-orange-800' }
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `${opt.c} p-6 rounded-xl font-bold text-xl hover:opacity-80 transition-opacity`;
                btn.innerHTML = `<div>${opt.v}</div><div class="text-xs opacity-60 font-normal uppercase">${opt.l}</div>`;
                btn.onclick = () => confirmTarget(opt.v);
                container.appendChild(btn);
            });
        }

        function confirmTarget(target) {
            if(gameState.phase === 'target_new') {
                // The current player becomes the killer
                gameState.killerPlayerIndex = gameState.currentPlayerIndex;
            }
            
            gameState.currentTarget = target;
            gameState.targetDraft.number = null;
            gameState.phase = 'playing';
            
            // If it was initial setup, we don't advance turn yet, just start playing
            if(gameState.phase !== 'target_init') {
                advanceTurn(false); // don't recursively skip here, logic handles it
            } else {
                // Just started
                gameState.phase = 'playing';
            }
            
            saveState();
            render();
        }

        // --- Game Logic ---
        function renderGame() {
            document.getElementById('game-target-display').textContent = gameState.currentTarget;
            document.getElementById('current-killer-name').textContent = gameState.players[gameState.killerPlayerIndex].name;
            document.getElementById('current-turn-name').textContent = gameState.players[gameState.currentPlayerIndex].name;

            const container = document.getElementById('players-container');
            container.innerHTML = '';

            // Changed: Rotation logic
            // Create an array of indices starting from the current player
            const totalPlayers = gameState.players.length;
            const startIdx = gameState.currentPlayerIndex;
            
            // We iterate through all players, but offset the index so current player is first
            for (let offset = 0; offset < totalPlayers; offset++) {
                const i = (startIdx + offset) % totalPlayers;
                const p = gameState.players[i];

                const isKiller = i === gameState.killerPlayerIndex;
                const isTurn = i === gameState.currentPlayerIndex;
                const isDead = p.lives <= 0;

                let borderClass = "border-gray-700";
                let bgClass = "bg-gray-800";
                let opacityClass = "opacity-100";
                let shadowClass = "";

                if (isDead) {
                    opacityClass = "opacity-40";
                    bgClass = "bg-gray-900";
                } else if (isTurn) {
                    borderClass = "border-yellow-500";
                    bgClass = "bg-gray-750";
                    shadowClass = "shadow-[0_0_15px_rgba(234,179,8,0.15)]";
                }

                if (isKiller && !isDead) {
                    // Killer specific styling override or addition
                    bgClass = isTurn ? "bg-red-900/20" : "bg-red-900/10";
                    if(isTurn) borderClass = "border-red-500";
                }

                // Changed: Increased heart icon size to text-2xl
                const livesHtml = Array(5).fill(0).map((_, idx) => {
                    return `<i class="fa-solid fa-heart text-2xl ${idx < p.lives ? 'text-red-500' : 'text-gray-700'}"></i>`;
                }).join('');

                const html = `
                    <div class="${bgClass} border ${borderClass} ${shadowClass} ${opacityClass} rounded-xl p-4 transition-all relative overflow-hidden">
                         ${isKiller ? '<div class="absolute top-0 right-0 p-2"><i class="fa-solid fa-skull text-red-500/50 text-4xl transform rotate-12"></i></div>' : ''}
                        <div class="flex justify-between items-center relative z-10">
                            <div>
                                <!-- Changed: Increased player name font size to text-3xl -->
                                <h3 class="font-bold text-3xl text-white">${p.name}</h3>
                                <div class="text-xs text-gray-400 font-mono mt-1">${isKiller ? 'KILLER' : isDead ? 'ELIMINATED' : 'HUNTER'}</div>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <div class="flex gap-1 bg-gray-900/50 p-2 rounded-lg border border-gray-700/50">
                                    ${livesHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }

            // Ensure the list is scrolled to the top so the current player is visible
            container.scrollTop = 0;

            // Update Undo Button state
            const undoBtn = document.getElementById('undo-btn');
            if(gameState.history.length > 0) {
                undoBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                undoBtn.disabled = false;
            } else {
                undoBtn.classList.add('opacity-50', 'cursor-not-allowed');
                undoBtn.disabled = true;
            }
            
            // Hide Hit button if player is already killer
            const hitBtn = document.getElementById('hit-btn');
            const isCurrentKiller = gameState.currentPlayerIndex === gameState.killerPlayerIndex;
            
            if(isCurrentKiller) {
                 hitBtn.classList.add('opacity-0', 'pointer-events-none');
            } else {
                 hitBtn.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        document.getElementById('hit-btn').addEventListener('click', () => {
            pushHistory();
            // Become new killer -> Set new target
            gameState.phase = 'target_new';
            saveState();
            render();
        });

        document.getElementById('miss-btn').addEventListener('click', () => {
            pushHistory();
            const player = gameState.players[gameState.currentPlayerIndex];
            player.lives--;
            
            if (player.lives <= 0) {
                player.isAlive = false;
                checkWinCondition();
            } else {
                advanceTurn();
                saveState();
                render();
            }
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (gameState.history.length > 0) {
                gameState = gameState.history.pop();
                saveState();
                render();
            }
        });

        function advanceTurn(skipChecks = false) {
            let loops = 0;
            const total = gameState.players.length;
            
            do {
                gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % total;
                loops++;
            } while (
                (!gameState.players[gameState.currentPlayerIndex].isAlive || 
                 gameState.currentPlayerIndex === gameState.killerPlayerIndex) && 
                loops < total * 2
            );

            // Special case: If only the killer is left alive (handled in checkWinCondition), or logic stuck
            // This loop skips dead players AND the killer himself (since killer doesn't shoot at himself usually)
            
            // If we looped back to killer because everyone else is dead, the killer wins.
            if(gameState.currentPlayerIndex === gameState.killerPlayerIndex) {
                 // Check if anyone else is alive
                 const othersAlive = gameState.players.filter((p,i) => i !== gameState.killerPlayerIndex && p.isAlive).length;
                 if(othersAlive === 0) {
                     checkWinCondition();
                 }
            }
        }

        function checkWinCondition() {
            const alive = gameState.players.filter(p => p.isAlive);
            if (alive.length === 1) {
                gameState.phase = 'over';
                saveState();
                render();
            } else if (alive.length === 0) {
                // Should not happen, but fallback
                gameState.phase = 'over';
                saveState();
                render();
            } else {
                // Game continues
                advanceTurn();
                saveState();
                render();
            }
        }

        // --- Results Logic ---
        function renderResults() {
            const winner = gameState.players.find(p => p.isAlive);
            document.getElementById('winner-name').textContent = winner ? winner.name : "No Winner";
        }

        document.getElementById('new-game-btn').addEventListener('click', () => {
            resetGame();
        });

        // --- Reset / Modals ---
        const resetBtn = document.getElementById('reset-data-btn');
        const confirmBtn = document.getElementById('confirm-reset');
        const cancelBtn = document.getElementById('cancel-reset');

        resetBtn.addEventListener('click', () => modals.confirm.classList.remove('hidden'));
        cancelBtn.addEventListener('click', () => modals.confirm.classList.add('hidden'));
        confirmBtn.addEventListener('click', () => {
            resetGame();
            modals.confirm.classList.add('hidden');
        });

        function resetGame() {
            // Keep players but reset lives
            gameState.players.forEach(p => {
                p.lives = 5;
                p.isAlive = true;
            });
            gameState.phase = 'setup';
            gameState.history = [];
            gameState.currentPlayerIndex = 0;
            gameState.killerPlayerIndex = 0;
            gameState.currentTarget = null;
            saveState();
            render();
        }

    </script>
</body>
</html>
