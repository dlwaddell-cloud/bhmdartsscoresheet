<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Out</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="manifest" href="checkout_manifest.json">
    <meta name="theme-color" content="#1a202c">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            overscroll-behavior: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; 
            border-radius: 4px;
        }

        .action-btn {
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: scale(0.95);
        }

        .input-focus-ring:focus {
            outline: 2px solid #3b82f6; /* Blue-500 */
            outline-offset: 2px;
        }

        /* Mode Selection Radio-like styling */
        .mode-btn {
            border: 2px solid transparent;
        }
        .mode-btn.active {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col">

    <!-- App Container -->
    <div id="app" class="relative w-full h-full max-w-5xl mx-auto flex flex-col bg-gray-900 shadow-2xl">
        
        <!-- Header -->
        <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center z-10">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-check text-blue-500 text-xl"></i>
                <h1 class="text-xl font-bold text-white tracking-wide">Check Out</h1>
            </div>
           <div class="flex gap-2">
                <button id="reset-data-btn" class="bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold py-2 px-3 rounded-lg transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Reset</span>
                </button>
                <a href="bardarts.html" class="bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold py-2 px-3 rounded-lg transition-colors flex items-center gap-2 no-underline">
                    <i class="fa-solid fa-door-open"></i>
                    <span>Hub</span>
                </a>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- VIEW: Setup -->
            <div id="setup-view" class="absolute inset-0 z-20 bg-gray-900 flex flex-col p-6 overflow-y-auto">
                <div class="w-full max-w-3xl mx-auto flex flex-col min-h-full">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-users text-3xl text-blue-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-white mb-2">Game Setup</h2>
                        <p class="text-gray-400 text-sm">Hit the generated checkouts to score points.</p>
                    </div>

                    <!-- Mode Selection -->
                    <div class="bg-gray-800 p-4 rounded-xl mb-6 border border-gray-700">
                        <h3 class="text-white font-bold mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-layer-group text-blue-400"></i> Difficulty Mode
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button class="mode-btn active bg-gray-700 p-3 rounded-lg flex flex-col items-center justify-center gap-1 transition-all" onclick="selectMode('easy')">
                                <span class="text-white font-bold text-lg">Easy</span>
                                <span class="text-xs text-gray-400">Targets 41-101</span>
                            </button>
                            <button class="mode-btn bg-gray-700 p-3 rounded-lg flex flex-col items-center justify-center gap-1 transition-all" onclick="selectMode('hard')">
                                <span class="text-white font-bold text-lg">Hard</span>
                                <span class="text-xs text-gray-400">Targets 41-170</span>
                            </button>
                        </div>
                    </div>

                    <div class="space-y-4 flex-1">
                        <div id="player-inputs" class="space-y-3">
                            <!-- Player list generated here -->
                        </div>
                        
                        <div class="flex gap-2 mt-4">
                            <input type="text" id="new-player-name" placeholder="Enter Name" class="input-focus-ring flex-1 bg-gray-800 border border-gray-700 text-white p-3 rounded-lg transition-all" />
                            <button id="add-player-btn" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-colors">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <button id="start-game-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6 transform transition hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        Start Game
                    </button>
                </div>
            </div>

            <!-- VIEW: Gameplay -->
            <div id="game-view" class="absolute inset-0 bg-gray-900 flex flex-col hidden">
                
                <!-- Info Banner -->
                <div class="bg-gray-800 p-4 shadow-md z-10 border-b border-gray-700">
                    <div class="max-w-5xl mx-auto w-full">
                        <div class="flex justify-between items-center mb-2">
                            <div class="text-left w-1/4">
                                <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Round</span>
                                <div class="text-xl font-bold text-white">
                                    <span id="current-round-num" class="text-blue-400">1</span>
                                    <span class="text-sm text-gray-500">/ 10</span>
                                </div>
                            </div>
                            <div class="text-center flex-1">
                                <span class="text-gray-400 text-xs uppercase tracking-wider font-bold block">Checkout Target</span>
                                <!-- Big Target Display -->
                                <div class="text-6xl font-bold text-blue-400 leading-tight" id="current-target-display">
                                    --
                                </div>
                                <div class="text-sm font-mono text-gray-400 mt-1" id="round-points-display">
                                    Value: 1 Point
                                </div>
                            </div>
                            <div class="text-right w-1/4">
                                 <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Scoring</span>
                                 <div class="text-xs font-mono text-gray-300 leading-snug whitespace-pre-line" id="scoring-legend">
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Player List -->
                <div class="flex-1 overflow-y-auto p-4 w-full">
                    <div class="max-w-5xl mx-auto w-full space-y-3" id="players-container">
                        <!-- Player Cards Injected Here -->
                    </div>
                </div>

                <!-- Controls -->
                <div class="bg-gray-800 border-t border-gray-700 p-4 z-20 flex flex-col">
                    <div class="max-w-5xl mx-auto w-full">
                        
                        <!-- Simple Hit/Miss Controls -->
                        <div class="grid grid-cols-2 gap-4 h-24 mb-3">
                             <button id="btn-failed" class="action-btn bg-red-500/10 border-2 border-red-500/50 text-red-500 hover:bg-red-500/20 rounded-2xl flex flex-col items-center justify-center">
                                <i class="fa-solid fa-xmark text-3xl mb-1"></i>
                                <span class="text-sm font-bold uppercase">Failed</span>
                            </button>
                            <button id="btn-success" class="action-btn bg-green-500/10 border-2 border-green-500/50 text-green-500 hover:bg-green-500/20 rounded-2xl flex flex-col items-center justify-center">
                                <i class="fa-solid fa-check text-3xl mb-1"></i>
                                <span class="text-sm font-bold uppercase">Finished</span>
                            </button>
                        </div>
                        
                        <!-- Undo Bar -->
                         <div class="flex justify-center">
                            <button id="undo-btn" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 py-2 px-4 rounded-lg hover:bg-gray-700 transition-colors">
                                <i class="fa-solid fa-rotate-left"></i> Undo Last Turn
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: Results -->
            <div id="results-view" class="absolute inset-0 bg-gray-900 z-30 flex flex-col p-6 hidden overflow-y-auto">
                <div class="w-full max-w-3xl mx-auto flex flex-col min-h-full">
                    <div class="text-center mb-8 pt-10">
                        <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 animate-bounce"></i>
                        <h2 class="text-4xl font-bold text-white mb-2">Game Over!</h2>
                        <p class="text-xl text-gray-400" id="winner-name">Player Wins</p>
                    </div>
                    
                    <div id="final-scores-list" class="flex-1 space-y-3 mb-4">
                        <!-- Final scores -->
                    </div>

                    <div class="flex flex-col gap-4 pb-10">
                        <button id="new-game-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                            Play Again
                        </button>
                        <a href="bardarts.html" class="w-full block text-center text-gray-500 hover:text-white py-3 bg-gray-800 rounded-xl">
                            Return to Menu
                        </a>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-xs w-full shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold text-white mb-2">Reset Game?</h3>
            <p class="text-gray-400 mb-6 text-sm">This will clear all current progress.</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-3 rounded-xl bg-gray-700 text-white font-bold hover:bg-gray-600">Cancel</button>
                <button id="confirm-reset" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const STORAGE_KEY = 'checkout_game_v1_state';
        
        // Bogey numbers to exclude in Hard Mode (and generally awkward numbers)
        const HARD_MODE_EXCLUSIONS = [159, 162, 163, 165, 166, 168, 169];

        // Round configurations
        // 10 turns total: 4x 1pt, 3x 2pt, 2x 3pt, 1x 4pt
        const ROUND_CONFIG = [
            { points: 1 }, { points: 1 }, { points: 1 }, { points: 1 },
            { points: 2 }, { points: 2 }, { points: 2 },
            { points: 3 }, { points: 3 },
            { points: 4 }
        ];

        let gameState = {
            players: [], // { name, score }
            mode: 'easy', // 'easy' | 'hard'
            phase: 'setup', // 'setup', 'playing', 'over'
            currentRoundIdx: 0,
            currentPlayerIdx: 0,
            targets: [], // Array of 10 integers generated at start
            history: [] // For undo
        };

        // --- DOM Elements ---
        const views = {
            setup: document.getElementById('setup-view'),
            game: document.getElementById('game-view'),
            results: document.getElementById('results-view')
        };
        const modals = {
            confirm: document.getElementById('confirm-modal')
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            render();
        });

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    gameState = JSON.parse(saved);
                    // Ensure defaults if old state loaded
                    if(!gameState.targets) gameState.targets = [];
                }
            } catch (e) {
                console.error("Save load error", e);
            }
        }

        function pushHistory() {
            // Keep last 5 moves
            const stateCopy = JSON.parse(JSON.stringify(gameState));
            stateCopy.history = []; 
            gameState.history.push(stateCopy);
            if(gameState.history.length > 5) gameState.history.shift();
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden'));
            if(views[viewName]) views[viewName].classList.remove('hidden');
        }

        function render() {
            switchView(gameState.phase === 'playing' ? 'game' : 
                       gameState.phase === 'over' ? 'results' : 'setup');

            if (gameState.phase === 'setup') {
                renderSetup();
            } else if (gameState.phase === 'playing') {
                renderGame();
            } else if (gameState.phase === 'over') {
                renderResults();
            }
        }

        // --- Setup Logic ---
        const playerInputsContainer = document.getElementById('player-inputs');
        const newPlayerInput = document.getElementById('new-player-name');
        
        function selectMode(mode) {
            gameState.mode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const isActive = btn.textContent.toLowerCase().includes(mode);
                btn.classList.toggle('active', isActive);
            });
            // We don't save state here necessarily, usually on player add or start
        }
        // Initial render of mode buttons
        selectMode(gameState.mode || 'easy');

        function renderSetup() {
            playerInputsContainer.innerHTML = '';
            gameState.players.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-gray-800 p-3 rounded-lg border border-gray-700";
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center font-bold text-gray-400">${i+1}</div>
                    <span class="flex-1 font-semibold text-white">${p.name}</span>
                    <button onclick="removePlayer(${i})" class="text-red-400 hover:text-red-300 p-2"><i class="fa-solid fa-trash"></i></button>
                `;
                playerInputsContainer.appendChild(div);
            });
            document.getElementById('start-game-btn').disabled = gameState.players.length < 1;
            
            // Sync UI with current state mode
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const isActive = btn.textContent.toLowerCase().includes(gameState.mode);
                btn.classList.toggle('active', isActive);
            });
        }

        document.getElementById('add-player-btn').addEventListener('click', addPlayer);
        newPlayerInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addPlayer() });

        function addPlayer() {
            const name = newPlayerInput.value.trim();
            if (name) {
                gameState.players.push({ name, score: 0 });
                newPlayerInput.value = '';
                saveState();
                render();
            }
        }

        window.removePlayer = (index) => {
            gameState.players.splice(index, 1);
            saveState();
            render();
        };

        function generateTargets(mode) {
            const targets = [];
            for(let i=0; i<10; i++) {
                let min, max;
                const roundPoints = ROUND_CONFIG[i].points;

                if (mode === 'easy') {
                    // Easy Rules: 
                    // 1pt: 41-60
                    // 2pt: 61-80
                    // 3pt: 81-90
                    // 4pt: 91-101
                    if (roundPoints === 1) { min = 41; max = 60; }
                    else if (roundPoints === 2) { min = 61; max = 80; }
                    else if (roundPoints === 3) { min = 81; max = 90; }
                    else { min = 91; max = 101; }
                } else {
                    // Hard Rules:
                    // 1pt: 41-80
                    // 2pt: 81-100
                    // 3pt: 101-130
                    // 4pt: 131-160 (Extending to 170 to match Rule 1 max)
                    if (roundPoints === 1) { min = 41; max = 80; }
                    else if (roundPoints === 2) { min = 81; max = 100; }
                    else if (roundPoints === 3) { min = 101; max = 130; }
                    else { min = 131; max = 170; }
                }

                let target;
                let valid = false;
                while (!valid) {
                    target = Math.floor(Math.random() * (max - min + 1)) + min;
                    if (mode === 'hard') {
                        if (!HARD_MODE_EXCLUSIONS.includes(target)) valid = true;
                    } else {
                        valid = true;
                    }
                }
                targets.push(target);
            }
            return targets;
        }

        document.getElementById('start-game-btn').addEventListener('click', () => {
            gameState.phase = 'playing';
            gameState.currentRoundIdx = 0;
            gameState.currentPlayerIdx = 0;
            gameState.history = [];
            // Reset scores
            gameState.players.forEach(p => p.score = 0);
            
            // Generate Targets
            gameState.targets = generateTargets(gameState.mode);

            saveState();
            render();
        });

        // --- Game Logic ---
        function renderGame() {
            const currentTarget = gameState.targets[gameState.currentRoundIdx];
            const roundConfig = ROUND_CONFIG[gameState.currentRoundIdx];
            const player = gameState.players[gameState.currentPlayerIdx];

            // Header Info
            document.getElementById('current-round-num').textContent = gameState.currentRoundIdx + 1;
            document.getElementById('current-target-display').textContent = currentTarget;
            document.getElementById('round-points-display').textContent = `Value: ${roundConfig.points} Point${roundConfig.points > 1 ? 's' : ''}`;
            
            // Update Scoring Legend
            const legendEl = document.getElementById('scoring-legend');
            if (gameState.mode === 'easy') {
                legendEl.textContent = "41-60 = 1\n61-80 = 2\n81-90 = 3\n91-101 = 4";
            } else {
                legendEl.textContent = "41-80 = 1\n81-100 = 2\n101-130 = 3\n131-160 = 4";
            }

            // Undo Button Visibility
            const hasHistory = gameState.history.length > 0;
            const undoBtn = document.getElementById('undo-btn');
            undoBtn.style.opacity = hasHistory ? '1' : '0.3';
            undoBtn.disabled = !hasHistory;

            // Render Players
            renderPlayerList();
        }

        function renderPlayerList() {
            const container = document.getElementById('players-container');
            container.innerHTML = '';
            
            const playerCount = gameState.players.length;
            if (playerCount === 0) return;

            // Rotate list to show current player first
            const indices = [];
            for (let i = 0; i < playerCount; i++) {
                indices.push((gameState.currentPlayerIdx + i) % playerCount);
            }
            
            indices.forEach((idx) => {
                const p = gameState.players[idx];
                const isTurn = idx === gameState.currentPlayerIdx;
                let bgClass = isTurn ? "bg-gray-700 border border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.2)]" : "bg-gray-800 border border-gray-700 opacity-80";
                
                const html = `
                    <div class="${bgClass} rounded-xl p-4 transition-all flex justify-between items-center relative overflow-hidden" id="card-player-${idx}">
                        <div class="flex items-center gap-4 z-10 overflow-hidden">
                            <div class="w-10 h-10 min-w-[2.5rem] rounded-full ${isTurn ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-400'} flex items-center justify-center font-bold text-lg">
                                ${idx+1}
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-bold text-white text-3xl leading-tight truncate">${p.name}</h3>
                                ${isTurn ? `<div class="text-xs text-blue-400 uppercase tracking-wider font-bold mt-1">Throwing Now</div>` : ''}
                            </div>
                        </div>
                        <div class="z-10 text-right pl-4">
                             <div class="text-5xl font-bold text-white font-mono">${p.score}</div>
                             <div class="text-xs text-gray-500 uppercase tracking-wider">Total</div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // --- Action Handlers ---

        document.getElementById('btn-success').addEventListener('click', () => {
            recordTurn(true);
        });

        document.getElementById('btn-failed').addEventListener('click', () => {
            recordTurn(false);
        });

        function recordTurn(success) {
            pushHistory();
            
            const pointsForRound = ROUND_CONFIG[gameState.currentRoundIdx].points;
            const player = gameState.players[gameState.currentPlayerIdx];

            if (success) {
                player.score += pointsForRound;
            }

            advanceTurn();
        }

        function advanceTurn() {
            // Check if we need to move to next round
            if (gameState.currentPlayerIdx >= gameState.players.length - 1) {
                gameState.currentPlayerIdx = 0;
                gameState.currentRoundIdx++;
                
                if (gameState.currentRoundIdx >= 10) {
                    endGame();
                    return;
                }
            } else {
                gameState.currentPlayerIdx++;
            }

            saveState();
            render();
        }

        // Undo
        document.getElementById('undo-btn').addEventListener('click', () => {
            if (gameState.history.length > 0) {
                gameState = gameState.history.pop();
                saveState();
                render();
            }
        });

        function renderResults() {
             // Sort winners (High score wins)
            const winners = [...gameState.players].sort((a,b) => b.score - a.score);
            
            if (winners.length > 0) {
                 document.getElementById('winner-name').textContent = `${winners[0].name} (${winners[0].score} pts)`;
            } else {
                 document.getElementById('winner-name').textContent = "No Players";
            }
            
            const list = document.getElementById('final-scores-list');
            list.innerHTML = winners.map((p, i) => `
                <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                    <div class="flex items-center gap-3">
                        <span class="text-gray-500 font-mono">#${i+1}</span>
                        <span class="font-bold text-white">${p.name}</span>
                    </div>
                    <span class="text-blue-400 font-bold text-xl">${p.score}</span>
                </div>
            `).join('');
        }

        function endGame() {
            gameState.phase = 'over';
            saveState();
            render();
        }

        // --- Reset / Modals ---
        const resetBtn = document.getElementById('reset-data-btn');
        const confirmBtn = document.getElementById('confirm-reset');
        const cancelBtn = document.getElementById('cancel-reset');
        const newGameBtn = document.getElementById('new-game-btn');

        resetBtn.addEventListener('click', () => modals.confirm.classList.remove('hidden'));
        cancelBtn.addEventListener('click', () => modals.confirm.classList.add('hidden'));
        
        confirmBtn.addEventListener('click', () => {
            fullReset();
            modals.confirm.classList.add('hidden');
        });
        
        newGameBtn.addEventListener('click', () => {
            fullReset();
        });

        function fullReset() {
            gameState.phase = 'setup';
            gameState.players = [];
            gameState.history = [];
            gameState.currentRoundIdx = 0;
            gameState.currentPlayerIdx = 0;
            gameState.targets = [];
            saveState();
            render();
        }

    </script>
</body>
</html>
