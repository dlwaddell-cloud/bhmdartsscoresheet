<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>501 Scorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a202c">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            overscroll-behavior: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; 
            border-radius: 4px;
        }

        .action-btn {
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: scale(0.95);
        }

        .input-focus-ring:focus {
            outline: 2px solid #60a5fa; /* Blue-400 */
            outline-offset: 2px;
        }

        .numpad-btn {
            touch-action: manipulation;
        }
        .numpad-btn:active {
            background-color: #4b5563;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- App Container -->
    <div id="app" class="relative w-full h-full max-w-lg mx-auto flex flex-col bg-gray-900 shadow-2xl">
        
        <!-- Header -->
        <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center z-10">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-hashtag text-blue-500 text-xl"></i>
                <h1 class="text-xl font-bold text-white tracking-wide">501 Darts</h1>
            </div>
            <div class="flex gap-2">
                 <button id="reset-data-btn" class="text-gray-400 hover:text-white transition-colors p-2" title="Reset Game">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <a href="bardarts.html" class="text-gray-400 hover:text-white transition-colors p-2" title="Exit">
                    <i class="fa-solid fa-door-open"></i>
                </a>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- VIEW: Setup -->
            <div id="setup-view" class="absolute inset-0 z-20 bg-gray-900 flex flex-col p-6 overflow-y-auto">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-users text-3xl text-blue-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Game Setup</h2>
                    <p class="text-gray-400 text-sm">Race to zero. Double out!</p>
                </div>

                <div class="space-y-4 flex-1">
                    <div id="player-inputs" class="space-y-3">
                        <!-- Player list generated here -->
                    </div>
                    
                    <div class="flex gap-2 mt-4">
                        <input type="text" id="new-player-name" placeholder="Enter Name" class="input-focus-ring flex-1 bg-gray-800 border border-gray-700 text-white p-3 rounded-lg transition-all" />
                        <button id="add-player-btn" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-colors">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>

                <button id="start-game-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6 transform transition hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Start Game
                </button>
            </div>

            <!-- VIEW: Gameplay -->
            <div id="game-view" class="absolute inset-0 bg-gray-900 flex flex-col hidden">
                
                <!-- Info Banner -->
                <div class="bg-gray-800 p-4 shadow-md z-10 border-b border-gray-700">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Turn</span>
                            <div class="text-xl font-bold text-white truncate max-w-[150px]" id="current-turn-name">
                                Player 1
                            </div>
                        </div>
                        <div class="text-right">
                             <span class="text-gray-400 text-xs uppercase tracking-wider font-bold">Input</span>
                             <div class="text-3xl font-bold text-blue-400 font-mono" id="current-input-display">
                                0
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Player List -->
                <div class="flex-1 overflow-y-auto p-4 space-y-3" id="players-container">
                    <!-- Player Cards Injected Here -->
                </div>

                <!-- Controls (Numpad) -->
                <div class="bg-gray-800 border-t border-gray-700 p-3 z-20 pb-6">
                     <div class="grid grid-cols-4 gap-2 h-48">
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(1)">1</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(2)">2</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(3)">3</button>
                        <button class="action-btn bg-red-900/50 text-red-400 font-bold rounded-lg border border-red-800" onclick="handleUndo()"><i class="fa-solid fa-rotate-left"></i></button>

                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(4)">4</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(5)">5</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(6)">6</button>
                        <button class="action-btn bg-gray-600 text-white font-bold rounded-lg" onclick="handleDelete()"><i class="fa-solid fa-delete-left"></i></button>

                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(7)">7</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(8)">8</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(9)">9</button>
                        <button class="action-btn bg-green-600 text-white text-xl font-bold rounded-lg row-span-2 flex items-center justify-center" onclick="submitScore()">
                            <i class="fa-solid fa-check"></i>
                        </button>

                        <button class="action-btn bg-gray-600 text-gray-300 font-bold rounded-lg text-sm" onclick="submitScore(true)">BUST</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg" onclick="handleNum(0)">0</button>
                        <button class="numpad-btn bg-gray-700 text-white text-xl font-bold rounded-lg opacity-0 pointer-events-none"></button> <!-- Spacer -->
                    </div>
                </div>
            </div>

            <!-- VIEW: Results -->
            <div id="results-view" class="absolute inset-0 bg-gray-900 z-30 flex flex-col p-6 hidden">
                <div class="text-center mb-8 pt-10">
                    <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 animate-bounce"></i>
                    <h2 class="text-4xl font-bold text-white mb-2">Game Shot!</h2>
                    <p class="text-xl text-gray-400" id="winner-name">Player Wins</p>
                </div>
                
                <div class="flex-1 flex flex-col justify-end gap-4 pb-10">
                    <button id="new-game-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                        Play Again
                    </button>
                    <a href="bardarts.html" class="w-full block text-center text-gray-500 hover:text-white py-3 bg-gray-800 rounded-xl">
                        Return to Menu
                    </a>
                </div>
            </div>

        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-xs w-full shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold text-white mb-2">Reset Game?</h3>
            <p class="text-gray-400 mb-6 text-sm">This will clear all current progress.</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-3 rounded-xl bg-gray-700 text-white font-bold hover:bg-gray-600">Cancel</button>
                <button id="confirm-reset" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        const STORAGE_KEY = '501Darts_v2_state';
        
        let gameState = {
            players: [], // { name, score, history: [] }
            phase: 'setup',
            currentPlayerIdx: 0,
            currentInput: 0,
            history: [] // Global history for Undo
        };

        // --- DOM ---
        const views = {
            setup: document.getElementById('setup-view'),
            game: document.getElementById('game-view'),
            results: document.getElementById('results-view')
        };
        const modals = {
            confirm: document.getElementById('confirm-modal')
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            render();
        });

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) gameState = JSON.parse(saved);
            } catch(e) {}
        }

        function pushHistory() {
            const copy = JSON.parse(JSON.stringify(gameState));
            copy.history = []; // Avoid deep nesting
            gameState.history.push(copy);
            if(gameState.history.length > 5) gameState.history.shift();
        }

        function render() {
            Object.values(views).forEach(el => el.classList.add('hidden'));
            if(gameState.phase === 'setup') {
                views.setup.classList.remove('hidden');
                renderSetup();
            } else if(gameState.phase === 'playing') {
                views.game.classList.remove('hidden');
                renderGame();
            } else {
                views.results.classList.remove('hidden');
                renderResults();
            }
        }

        // --- Setup ---
        const playerInput = document.getElementById('new-player-name');
        
        function renderSetup() {
            const list = document.getElementById('player-inputs');
            list.innerHTML = '';
            gameState.players.forEach((p, i) => {
                list.innerHTML += `
                    <div class="flex items-center gap-3 bg-gray-800 p-3 rounded-lg border border-gray-700">
                        <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center font-bold text-gray-400">${i+1}</div>
                        <span class="flex-1 font-semibold text-white">${p.name}</span>
                        <button onclick="removePlayer(${i})" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
            document.getElementById('start-game-btn').disabled = gameState.players.length < 1;
        }

        document.getElementById('add-player-btn').addEventListener('click', addPlayer);
        playerInput.addEventListener('keypress', e => { if(e.key === 'Enter') addPlayer() });

        function addPlayer() {
            const name = playerInput.value.trim();
            if(name) {
                gameState.players.push({ name, score: 501, history: [] });
                playerInput.value = '';
                saveState();
                render();
            }
        }

        window.removePlayer = (i) => {
            gameState.players.splice(i, 1);
            saveState();
            render();
        };

        document.getElementById('start-game-btn').addEventListener('click', () => {
            gameState.phase = 'playing';
            gameState.currentPlayerIdx = 0;
            gameState.currentInput = 0;
            gameState.history = [];
            // Reset scores
            gameState.players.forEach(p => { p.score = 501; p.history = []; });
            saveState();
            render();
        });

        // --- Game ---
        function renderGame() {
            const player = gameState.players[gameState.currentPlayerIdx];
            document.getElementById('current-turn-name').textContent = player.name;
            document.getElementById('current-input-display').textContent = gameState.currentInput;

            const container = document.getElementById('players-container');
            container.innerHTML = '';
            
            gameState.players.forEach((p, i) => {
                const isTurn = i === gameState.currentPlayerIdx;
                const lastScore = p.history.length ? p.history[p.history.length-1] : '-';
                const bgClass = isTurn ? "bg-gray-700 border border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.2)]" : "bg-gray-800 border border-gray-700 opacity-80";

                container.innerHTML += `
                    <div class="${bgClass} rounded-xl p-4 flex justify-between items-center transition-all" id="card-${i}">
                        <div>
                            <h3 class="font-bold text-white text-lg">${p.name}</h3>
                            <div class="text-xs text-gray-400">Last: <span class="text-gray-300 font-mono">${lastScore}</span></div>
                        </div>
                        <div class="text-4xl font-mono font-bold text-white">${p.score}</div>
                    </div>
                `;
            });

            const activeCard = document.getElementById(`card-${gameState.currentPlayerIdx}`);
            if(activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.handleNum = (num) => {
            const newVal = parseInt(gameState.currentInput.toString() + num);
            if (newVal <= 180) {
                gameState.currentInput = newVal;
                renderGame(); // Just re-render game view parts
                // Optimize: direct update
                document.getElementById('current-input-display').textContent = gameState.currentInput;
            }
        };

        window.handleDelete = () => {
            const str = gameState.currentInput.toString();
            gameState.currentInput = parseInt(str.slice(0, -1) || 0);
            document.getElementById('current-input-display').textContent = gameState.currentInput;
        };

        window.submitScore = (isBust = false) => {
            pushHistory();
            const player = gameState.players[gameState.currentPlayerIdx];
            const input = gameState.currentInput;
            
            let points = input;
            let bust = isBust;

            if (!bust) {
                if (player.score - points === 0) {
                    // Winning condition (Assume valid double out for app simplicity)
                    player.score = 0;
                    gameState.phase = 'over';
                    saveState();
                    render();
                    return;
                } else if (player.score - points <= 1) {
                    // Bust (Leaves 1 or less without hitting 0 exactly implies invalid out usually, standard rules: cannot leave 1)
                    bust = true;
                }
            }

            if (bust) {
                player.history.push("BUST");
            } else {
                player.score -= points;
                player.history.push(points);
            }

            gameState.currentInput = 0;
            gameState.currentPlayerIdx = (gameState.currentPlayerIdx + 1) % gameState.players.length;
            saveState();
            render();
        };

        window.handleUndo = () => {
            if(gameState.history.length > 0) {
                gameState = gameState.history.pop();
                saveState();
                render();
            }
        };

        // --- Results ---
        function renderResults() {
            const winner = gameState.players.find(p => p.score === 0);
            document.getElementById('winner-name').textContent = winner ? winner.name : "Winner";
        }

        document.getElementById('new-game-btn').addEventListener('click', () => {
            // Full reset
            gameState.phase = 'setup';
            gameState.players.forEach(p => { p.score = 501; p.history = []; });
            gameState.history = [];
            saveState();
            render();
        });

        // --- Modals ---
        document.getElementById('reset-data-btn').addEventListener('click', () => modals.confirm.classList.remove('hidden'));
        document.getElementById('cancel-reset').addEventListener('click', () => modals.confirm.classList.add('hidden'));
        document.getElementById('confirm-reset').addEventListener('click', () => {
            // Hard reset
            gameState = { players: [], phase: 'setup', currentPlayerIdx: 0, currentInput: 0, history: [] };
            saveState();
            render();
            modals.confirm.classList.add('hidden');
        });

    </script>
</body>
</html>
